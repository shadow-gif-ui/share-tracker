<!DOCTYPE html>
<html>
<head>
  <title>Share Tracker</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 5px 10px; }
    table { border-collapse: collapse; margin-top: 20px; }
    td, th { border: 1px solid black; padding: 8px; }
  </style>
</head>
<body>

<h2>📊 My Share Tracker</h2>

<input id="name" placeholder="Stock Name">
<input id="date" type="date">
<input id="qty" type="number" placeholder="Quantity">
<input id="price" type="number" placeholder="Buy Price">
<input id="current" type="number" placeholder="Current Price">

<button onclick="addShare()">Add Share</button>
<h3>Total Investment: ₹<span id="investment">0</span></h3>
<h3>Current Value: ₹<span id="value">0</span></h3>
<h3>Profit/Loss: ₹<span id="profit">0</span></h3>

<table id="table">
  <tr>
    <th>Name</th>
    <th>Date</th>
    <th>Qty</th>
    <th>Price</th>
    <th>Current Price</th>
  </tr>
</table>

<script>
let shares = JSON.parse(localStorage.getItem("shares")) || [];

function updateSummary() {
  let investment = 0;
  let value = 0;

  shares.forEach(s => {
    investment += (s.qty || 0) * (s.price || 0);
value += (s.qty || 0) * (s.current || 0);
  });

  document.getElementById("investment").innerText = investment;
  document.getElementById("value").innerText = value;
  document.getElementById("profit").innerText = value - investment;
}

window.onload = function() {
  let table = document.getElementById("table");

  shares.forEach(s => {
    let row = table.insertRow();
    row.insertCell(0).innerText = s.name;
    row.insertCell(1).innerText = s.date;
    row.insertCell(2).innerText = s.qty;
    row.insertCell(3).innerText = s.price;
    row.insertCell(4).innerText = s.current;
  });

  updateSummary();
};

function addShare() {
  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let qty = parseFloat(document.getElementById("qty").value);
  let price = parseFloat(document.getElementById("price").value);
  let current = parseFloat(document.getElementById("current").value);

  let newShare = { name, date, qty, price, current };
  shares.push(newShare);

  localStorage.setItem("shares", JSON.stringify(shares));

  let table = document.getElementById("table");
  let row = table.insertRow();

  row.insertCell(0).innerText = name;
  row.insertCell(1).innerText = date;
  row.insertCell(2).innerText = qty;
  row.insertCell(3).innerText = price;
  row.insertCell(4).innerText = current;

  updateSummary();
}
</script>

</body>
</html>
